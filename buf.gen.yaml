version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: yunyuyuan/anypaste/gen
plugins:
  - remote: buf.build/protocolbuffers/go
    out: gen
    opt: paths=source_relative
  - remote: buf.build/connectrpc/gosimple
    out: gen
    opt:
      - paths=source_relative
      - simple
  - local: ./web/node_modules/.bin/protoc-gen-es
    out: web/src/gen
    opt: target=ts
  - local: ./web/node_modules/.bin/protoc-gen-connect-query
    out: web/src/gen
    opt: target=ts
inputs:
  - directory: proto